baseURL: https://yngvest.github.io/blog
languageCode: en-us
title: "Igor's Tech Corner"
theme:
  - PaperMod

params:
  homeInfoParams:
    Title: "Hi there 👋"
    Content: "I am Igor and I write here about tech stuff and what I learn along the way."

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/igor-shtukarev/"
  
  ShowReadingTime: true
  mainSections:
    - posts
    - log

menus:
  main:
    - identifier: posts
      name: "💡 Blog"
      url: /posts/
      weight: 10
    - identifier: log
      name: "📝 Log"
      url: /log/
      weight: 20

caches:
  images:
    dir: :cacheDir/images